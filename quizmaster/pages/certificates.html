<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuizMaster Pro — Certificates</title>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/sidebar.css"/>
  <link rel="stylesheet" href="../css/admin.css"/>
  <link rel="stylesheet" href="../css/quiz.css"/>
</head>
<body>
<div class="app-layout">

  <aside class="sidebar">
    <div class="sb-logo">
      <div class="sb-mark">Q</div>
      <div><div class="sb-name">QuizMaster</div><div class="sb-sub">PRO v2.0</div></div>
    </div>
    <nav class="sb-nav">
      <div class="sb-section-label">Student</div>
      <a href="../index.html"       class="nav-item"><span class="nav-ico">⬡</span>Dashboard</a>
      <a href="take-quiz.html"      class="nav-item"><span class="nav-ico">▶</span>Take a Quiz</a>
      <a href="certificates.html"   class="nav-item active"><span class="nav-ico">❋</span>My Certificates</a>
      <div class="sb-section-label admin-only">Admin</div>
      <a href="manage-quizzes.html" class="nav-item admin-only"><span class="nav-ico">◈</span>Manage Quizzes</a>
      <a href="results.html"        class="nav-item admin-only"><span class="nav-ico">◎</span>Results</a>
      <a href="settings.html"       class="nav-item admin-only"><span class="nav-ico">⚙</span>Settings</a>
    </nav>
    <div class="sb-footer">
      <div class="user-row">
        <div class="avatar">A</div>
        <div><div class="user-name">Admin User</div><div class="user-role" id="roleToggle">→ Switch to Student</div></div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-title">Certificates</div>
      <div class="topbar-right"><span class="badge badge-blue" id="roleBadge">👑 Admin</span></div>
    </header>

    <div class="content">
      <div style="margin-bottom:20px">
        <div style="font-family:var(--font-display);font-size:18px;font-weight:600;margin-bottom:4px">Achievement Certificates</div>
        <div style="color:var(--tx2);font-size:14px">Click any certificate to preview and download it as a high-quality PNG image.</div>
      </div>
      <div class="quiz-grid" id="certsGrid"></div>
    </div>
  </main>
</div>

<!-- CERTIFICATE MODAL -->
<div class="modal-overlay" id="certModal">
  <div class="modal" style="max-width:920px">
    <div class="modal-header">
      <div class="modal-title">🏆 Certificate of Achievement</div>
      <button class="close-btn" onclick="closeCertModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="cert-preview"><canvas id="certCanvas"></canvas></div>
      <p class="cert-info" id="certInfo"></p>
      <p class="cert-id"   id="certIdDisplay"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeCertModal()">Close</button>
      <button class="btn btn-gold" id="certDownloadBtn" disabled>⬇ Download PNG</button>
    </div>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/certificate.js"></script>
<script src="../js/certificates.js"></script>
</body>
</html>
